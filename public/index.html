<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bridge | Network Operations</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --card-border: #334155;
            --accent: #3b82f6;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #22c55e;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --sidebar-width: 420px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }

        body {
            background-color: var(--bg);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            display: grid;
            grid-template-columns: var(--sidebar-width) 1fr;
        }

        /* ─── Sidebar ─── */
        aside {
            background: var(--bg);
            border-right: 1px solid var(--card-border);
            display: flex;
            flex-direction: column;
            z-index: 1000;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--card-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .brand-container { display: flex; align-items: center; gap: 10px; }
        .brand { font-size: 1.1rem; letter-spacing: -0.5px; color: var(--text); font-weight: 600; }
        .status-badge {
            font-size: 0.65rem;
            background: rgba(59,130,246,0.15);
            color: var(--accent);
            padding: 2px 7px;
            border-radius: 5px;
            font-weight: 600;
            border: 1px solid rgba(59,130,246,0.3);
            letter-spacing: 0.5px;
        }

        /* ─── Stats Row ─── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0;
            border-bottom: 1px solid var(--card-border);
            flex-shrink: 0;
        }

        .stat-card {
            padding: 0.75rem 0.5rem;
            text-align: center;
            border-right: 1px solid var(--card-border);
        }
        .stat-card:last-child { border-right: none; }

        .stat-val { font-size: 1.3rem; font-weight: 600; color: var(--text); }
        .stat-val.danger { color: var(--danger); }
        .stat-val.warning { color: var(--warning); }
        .stat-label { font-size: 0.65rem; color: var(--text-dim); font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; margin-top: 2px; }

        /* ─── Tab Bar ─── */
        .tab-bar {
            display: flex;
            border-bottom: 1px solid var(--card-border);
            flex-shrink: 0;
        }

        .tab-btn {
            flex: 1;
            padding: 0.6rem;
            background: transparent;
            border: none;
            border-bottom: 2px solid transparent;
            color: var(--text-dim);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: color 0.15s, border-color 0.15s;
        }

        .tab-btn:hover { color: var(--text); }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
        .tab-btn.has-alert { color: var(--danger); }
        .tab-btn.has-alert.active { border-bottom-color: var(--danger); }

        /* ─── Scrollable Content ─── */
        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .tab-panel { display: none; padding: 1rem 1.25rem; }
        .tab-panel.active { display: block; }

        .section-title {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.6rem;
            font-weight: 600;
        }

        /* ─── Route List ─── */
        .route-item {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 0.75rem 1rem;
            border-radius: 6px;
            margin-bottom: 0.4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .route-tag { font-weight: 600; margin-right: 8px; font-size: 0.95rem; }
        .route-name { font-size: 0.85rem; color: var(--text-dim); }
        .route-stats { font-size: 0.8rem; color: var(--text-dim); text-align: right; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }

        .badge-danger { background: rgba(239,68,68,0.2); color: var(--danger); padding: 2px 6px; border-radius: 4px; font-weight: 600; font-size: 0.7rem; }
        .badge-warning { background: rgba(245,158,11,0.2); color: var(--warning); padding: 2px 6px; border-radius: 4px; font-weight: 600; font-size: 0.7rem; }

        /* ─── Incident Feed ─── */
        .log-container {
            background: #0b101d;
            border: 1px solid var(--card-border);
            border-radius: 6px;
            padding: 0.5rem;
            font-size: 0.82rem;
            min-height: 120px;
        }

        .log-item {
            padding: 7px 4px;
            border-bottom: 1px solid var(--card-border);
            display: flex;
            gap: 10px;
            align-items: flex-start;
            line-height: 1.4;
        }
        .log-item:last-child { border-bottom: none; }
        .log-time { color: var(--text-dim); font-variant-numeric: tabular-nums; font-size: 0.7rem; white-space: nowrap; margin-top: 2px; }
        .log-item.danger { color: var(--danger); }
        .log-item.warning { color: var(--warning); }
        .log-item.dim { color: var(--text-dim); font-style: italic; }

        /* ─── Route Ladder ─── */
        .ladder-route {
            margin-bottom: 1.25rem;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 6px;
            overflow: hidden;
        }

        .ladder-route-label {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid var(--card-border);
            background: rgba(0,0,0,0.2);
        }

        .ladder-route-tag { font-weight: 600; font-size: 0.9rem; }
        .ladder-route-name { font-size: 0.8rem; color: var(--text-dim); flex: 1; }
        .ladder-badge { font-size: 0.65rem; font-weight: 700; padding: 2px 6px; border-radius: 3px; letter-spacing: 0.03em; }
        .ladder-badge.critical { background: rgba(239,68,68,0.25); color: var(--danger); }
        .ladder-badge.warning { background: rgba(245,158,11,0.25); color: var(--warning); }

        .ladder-track { padding: 0.6rem 0.75rem; border-bottom: 1px solid var(--card-border); }
        .ladder-track:last-child { border-bottom: none; }

        .ladder-dir-label { font-size: 0.65rem; color: var(--text-dim); display: block; margin-bottom: 4px; font-weight: 600; }

        .ladder-rail {
            position: relative;
            height: 36px;
            width: 100%;
        }

        .ladder-rail-line {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--card-border);
            transform: translateY(-50%);
        }

        .ladder-chip {
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            background: var(--card-bg);
            border: 2px solid #555;
            border-radius: 4px;
            padding: 2px 5px;
            font-size: 0.65rem;
            font-weight: 600;
            white-space: nowrap;
            cursor: default;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            z-index: 10;
            transition: border-color 0.3s;
        }

        .chip-id { line-height: 1; }
        .chip-dev { font-size: 0.55rem; font-weight: 500; }
        .chip-gap { font-size: 0.55rem; color: var(--text-dim); }

        /* Chip states */
        .chip-ok        { border-color: #22c55e; color: #22c55e; }
        .chip-bunching  { border-color: var(--danger); color: var(--danger); background: rgba(239,68,68,0.15); animation: pulse-red 1.2s infinite; }
        .chip-closing   { border-color: var(--warning); color: var(--warning); }
        .chip-dwell     { border-color: #a78bfa; color: #a78bfa; }
        .chip-early     { border-color: #60a5fa; color: #60a5fa; }
        .chip-late      { border-color: var(--warning); color: var(--warning); }
        .chip-gap-ahead { border-color: #f97316; color: #f97316; }

        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
            50%       { box-shadow: 0 0 0 4px rgba(239,68,68,0); }
        }

        .ladder-empty-msg { font-size: 0.8rem; color: var(--text-dim); font-style: italic; padding: 0.5rem 0.75rem; display: block; }

        /* ─── Recommendations Panel ─── */
        .rec-empty { font-size: 0.82rem; color: var(--text-dim); font-style: italic; padding: 0.5rem; text-align: center; }

        .rec-card {
            border-radius: 6px;
            padding: 0.75rem;
            margin-bottom: 0.6rem;
            border-left: 4px solid #555;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
        }

        .rec-critical { border-left-color: var(--danger) !important; background: rgba(239,68,68,0.07); }
        .rec-high     { border-left-color: var(--warning) !important; background: rgba(245,158,11,0.07); }
        .rec-medium   { border-left-color: var(--accent) !important; }

        .rec-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 0.5rem;
            flex-wrap: wrap;
        }

        .rec-action-badge {
            font-size: 0.65rem;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 3px;
            letter-spacing: 0.04em;
        }

        .rec-badge-critical { background: rgba(239,68,68,0.25); color: var(--danger); }
        .rec-badge-high     { background: rgba(245,158,11,0.25); color: var(--warning); }
        .rec-badge-medium   { background: rgba(59,130,246,0.2); color: var(--accent); }

        .rec-vehicle { font-size: 0.8rem; font-weight: 600; }
        .rec-route { font-size: 0.75rem; color: var(--text-dim); }
        .rec-time { font-size: 0.7rem; color: var(--text-dim); margin-left: auto; font-variant-numeric: tabular-nums; }

        .rec-reason {
            font-size: 0.8rem;
            color: var(--text);
            line-height: 1.5;
            margin-bottom: 0.4rem;
        }

        .rec-details {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .rec-detail { font-size: 0.75rem; color: var(--text-dim); }
        .rec-detail-label { color: var(--text-dim); }
        .rec-detail strong { color: var(--text); }

        .rec-cross { border-left-color: #a78bfa !important; }
        .rec-cross-badge {
            font-size: 0.6rem;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 3px;
            background: rgba(167,139,250,0.2);
            color: #a78bfa;
            letter-spacing: 0.04em;
        }

        /* ─── Map Area ─── */
        main { position: relative; background: #111; }
        #map { width: 100%; height: 100%; background: #0f172a; }

        .vehicle-marker {
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-bottom: 12px solid #fff;
        }

        #last-updated {
            position: absolute;
            bottom: 24px;
            right: 24px;
            background: var(--card-bg);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            color: var(--text-dim);
            z-index: 500;
            border: 1px solid var(--card-border);
            font-variant-numeric: tabular-nums;
        }

        /* ─── Modal ─── */
        #settings-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15,23,42,0.8);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .settings-box {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 8px;
            border: 1px solid var(--card-border);
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
        }

        .settings-box h3 { margin-bottom: 0.5rem; color: var(--text); }

        input {
            background: var(--bg);
            border: 1px solid var(--card-border);
            color: var(--text);
            padding: 10px;
            width: 100%;
            margin: 10px 0;
            border-radius: 4px;
        }
        input:focus { outline: none; border-color: var(--accent); }

        button { padding: 8px 16px; cursor: pointer; border-radius: 4px; border: none; font-weight: 500; font-size: 0.9rem; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }

        .btn-primary { background: var(--accent); color: #fff; }
        .btn-ghost { background: transparent; color: var(--text-dim); }
        .btn-small { background: transparent; border: 1px solid var(--card-border); color: var(--text-dim); padding: 4px 10px; font-size: 0.75rem; }
        .btn-small:hover { border-color: var(--text); color: var(--text); }
    </style>
</head>

<body>
    <aside>
        <div class="sidebar-header">
            <div class="brand-container">
                <span class="brand">BRIDGE</span>
                <span class="status-badge">NET OPS</span>
            </div>
            <button class="btn-small" onclick="toggleSettings(true)">CONFIG</button>
        </div>

        <!-- Stats bar: 4 metrics at a glance -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-val" id="stat-count">--</div>
                <div class="stat-label">Active</div>
            </div>
            <div class="stat-card">
                <div class="stat-val danger" id="stat-bunching">--</div>
                <div class="stat-label">Bunching</div>
            </div>
            <div class="stat-card">
                <div class="stat-val warning" id="stat-gaps">--</div>
                <div class="stat-label">Gaps</div>
            </div>
            <div class="stat-card">
                <div class="stat-val warning" id="stat-recs">--</div>
                <div class="stat-label">Actions</div>
            </div>
        </div>

        <!-- Tab navigation -->
        <div class="tab-bar">
            <button class="tab-btn active" id="tab-dispatch" onclick="switchTab('dispatch')">Dispatch</button>
            <button class="tab-btn" id="tab-ladder" onclick="switchTab('ladder')">Ladder</button>
            <button class="tab-btn" id="tab-routes" onclick="switchTab('routes')">Routes</button>
            <button class="tab-btn" id="tab-feed" onclick="switchTab('feed')">Feed</button>
        </div>

        <div class="sidebar-content">

            <!-- Dispatch tab: actionable recommendations -->
            <div class="tab-panel active" id="panel-dispatch">
                <div class="section-title" style="margin-top:0.25rem;">Dispatch Actions</div>
                <div id="rec-container">
                    <div class="rec-empty">Waiting for data...</div>
                </div>
            </div>

            <!-- Ladder tab: route ladder view -->
            <div class="tab-panel" id="panel-ladder">
                <div class="section-title" style="margin-top:0.25rem;">Route Ladder</div>
                <div id="ladder-container">
                    <div class="rec-empty">Waiting for data...</div>
                </div>
            </div>

            <!-- Routes tab: per-route summary cards -->
            <div class="tab-panel" id="panel-routes">
                <div class="section-title" style="margin-top:0.25rem;">Active Routes</div>
                <div id="route-list-container">Loading...</div>
            </div>

            <!-- Feed tab: event log -->
            <div class="tab-panel" id="panel-feed">
                <div class="section-title" style="margin-top:0.25rem;">Incident Feed</div>
                <div class="log-container" id="incident-log">
                    <div class="log-item dim">Initializing Network...</div>
                </div>
            </div>

        </div>
    </aside>

    <main>
        <div id="map"></div>
        <div id="last-updated">SYNC: --:--</div>
    </main>

    <div id="settings-overlay">
        <div class="settings-box">
            <h3>Configuration</h3>
            <p style="font-size:0.85rem; color:var(--text-dim); margin-bottom:1rem;">Enter route tags separated by comma</p>
            <input id="routes-input" type="text" placeholder="510, 504, 501">
            <div style="display:flex; gap:10px; margin-top:1rem;">
                <button class="btn-primary" onclick="saveConfig()">Update Network</button>
                <button class="btn-ghost" onclick="toggleSettings(false)">Cancel</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initMap, updateMapState, startAnimationLoop } from './js/map.js';
        import { initUI, updateDashboard }                     from './js/ui.js';
        import { initLadder, renderLadder, renderRecommendations } from './js/ladder.js';
        import { fetchState, fetchRecommendations }            from './js/api.js';

        // Tab switching
        window.switchTab = function(name) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(`tab-${name}`).classList.add('active');
            document.getElementById(`panel-${name}`).classList.add('active');
        };

        async function init() {
            initUI();
            initLadder();
            initMap('map');
            startAnimationLoop();

            async function loop() {
                const [state, recData] = await Promise.all([
                    fetchState(),
                    fetchRecommendations(),
                ]);

                if (state) {
                    updateMapState(state);
                    updateDashboard(state, recData);
                    renderLadder(state);
                }

                if (recData) {
                    renderRecommendations(recData.recommendations ?? []);

                    // Flash the dispatch tab if there are critical recommendations
                    const hasCritical = (recData.recommendations ?? []).some(r => r.severity === 'CRITICAL');
                    const dispatchBtn = document.getElementById('tab-dispatch');
                    dispatchBtn.classList.toggle('has-alert', hasCritical);

                    // Update actions stat
                    document.getElementById('stat-recs').innerText = recData.count ?? 0;
                }
            }

            setInterval(loop, 4000);
            loop();
        }

        init();
    </script>
</body>

</html>
